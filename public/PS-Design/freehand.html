<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vue.js 2 Drawing Board with Grid</title>
  <link href="./css/bootstrap-v5.css" rel="stylesheet">
  <link href="../css/slick.css" rel="stylesheet">
  <link href="../css/slick-theme.css" rel="stylesheet">
  <link href="../css/animate.css" rel="stylesheet">
  <link href="../css/font-awesome.min.css" rel="stylesheet">
  <link href="../css/hover-min.css" rel="stylesheet">
  <link href="./css/main.css" rel="stylesheet">
  <!-- JavaScript Files -->
  <script src="../js/jquery-3.6.0.min.js"></script>
  <script src="./js/popper.min.js"></script>
  <script src="./js/bootstrap.min.js"></script>
  <script src="../js/slick.min.js"></script>
  <script src="./js/jquery.steps.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.4.2/jquery.min.js?ver=1.4.2"></script>
  <style>
    #myCanvas {
      cursor: crosshair;

      height: 100% !important;
      width: 100% !important;
      border: 1px solid #d2d2d2;
      margin-top: 10px;
    }
    #controls {
      display: flex;
      gap: 10px;
    }
    #savedImageContainer {
    display: flex;
    gap: 10px;
    }
    #savedImage {
 
    border: 4px solid #ebebeb;
    border-radius: 8px;
    }
   
    .eraser-circle {
      position: absolute;
      border: 2px solid red;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>

<!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Launch demo modal
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="Accedentsketchfreehand">
          <div id="controls">
      
      
      <div class="d-flex align-items-center"> <span class="fw-bold">اختر اللون </span>    <input type="color" v-model="color" :disabled="isImageSaved" style="    width: 45px;height: 45px;" /></div>
            <button @click="startDrawing" :disabled="!color || isImageSaved" class="btn moi-btn--brown--outline">ابدأ الرسم</button>
            <button @click="toggleEraser" :disabled="isImageSaved" class="btn moi-btn--brown--outline">ممحاة</button>
            <button @click="saveCanvas" :disabled="isImageSaved" class=" btn moi-btn--primary">حفظ</button>
            <button @click="resetCanvas" class=" btn moi-btn--text">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M21.25 12C21.25 14.2644 20.4194 16.4501 18.9157 18.143C17.4119 19.8359 15.3394 20.9184 13.0909 21.1855C10.8423 21.4525 8.57394 20.8855 6.71549 19.5919C4.85705 18.2983 3.53766 16.3679 3.00731 14.1665C2.47696 11.9652 2.7725 9.64573 3.83792 7.6477C4.90334 5.64967 6.66464 4.11184 8.7881 3.32558C10.9116 2.53932 13.2497 2.55926 15.3594 3.38162C17.4691 4.20397 19.2039 5.77162 20.2351 7.78753" stroke="#00109D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path> <path d="M21.0298 3.70004L21.0298 7.30004C21.0298 7.85232 20.5821 8.30004 20.0298 8.30004L16.3998 8.30004" stroke="#00109D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
              إعادة تعيين</button>
          </div>
         <div class="row">
      
      <div class="col-md-8">
        <canvas id="myCanvas" ref="canvas"></canvas>
      
      </div>
       <div class="col-md-4">
        <div v-if="isImageSaved" id="savedImageContainer" class="d-flex flex-column" >
          <div class="d-flex gap-2 ">
           <button v-if="isImageSaved" @click="deleteImage" class=" btn moi-btn--primary">حذف الصورة</button>
           <a v-if="isImageSaved" :href="savedImageDataUrl" download="drawing.png" class=" btn moi-btn--primary">تحميل</a>
          </div>
           <img :src="savedImageDataUrl" alt="Saved Drawing" id="savedImage" class=" w-100 shadow-22" />
         </div>
       </div>
         </div>
          <div v-if="isImageSaved" class="hint alert alert-primary mt-5">
            لايمكن تكملة الرسم حتي يتم الغاء الحالي
          </div>
        </div>
      </div>

    </div>
  </div>
</div>





  <script>
    new Vue({
      el: '#Accedentsketchfreehand',
      data: {
        color: '#000000',
        isDrawing: false,
        isErasing: false,
        canvasContext: null,
        savedImageDataUrl: '',
        isImageSaved: false,
        canDraw: false,
        showGrid: false,  // التحكم في إظهار الشبكة
        eraserRadius: 20,  // حجم دائرة الممحاة
        eraserCircle: null // الدائرة الممحاة لتحديد مكان المحو
      },
      methods: {
        initializeCanvas() {
          const canvas = this.$refs.canvas;
          this.canvasContext = canvas.getContext('2d');
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          this.canvasContext.fillStyle = "#fff";
          this.canvasContext.fillRect(0, 0, canvas.width, canvas.height);

          this.addCanvasEventListeners(canvas);
        },

        addCanvasEventListeners(canvas) {
          let canvasX, canvasY;
          const ctx = this.canvasContext;

          // Mouse event handlers
          $(canvas)
            .mousedown((e) => {
              if (this.canDraw && !this.isImageSaved) {
                this.isDrawing = true;
                canvasX = e.pageX - canvas.offsetLeft;
                canvasY = e.pageY - canvas.offsetTop;
                ctx.beginPath();
                ctx.moveTo(canvasX, canvasY);
              }
            })
            .mousemove((e) => {
              if (this.isDrawing && !this.isImageSaved) {
                canvasX = e.pageX - canvas.offsetLeft;
                canvasY = e.pageY - canvas.offsetTop;

                if (this.isErasing) {
                  // رسم دائرة للممحاة
                  this.updateEraserCircle(canvasX, canvasY);
                  ctx.clearRect(canvasX - this.eraserRadius, canvasY - this.eraserRadius, this.eraserRadius * 2, this.eraserRadius * 2);
                } else {
                  ctx.lineTo(canvasX, canvasY);
                  ctx.strokeStyle = this.color;
                  ctx.lineWidth = 5;
                  ctx.stroke();
                }
              }
            })
            .mouseup(() => {
              if (this.isDrawing && !this.isImageSaved) {
                this.isDrawing = false;
                ctx.closePath();
              }
            });

          // Touch event handlers
          let draw = {
            started: false,
            start(evt) {
              if (this.canDraw && !this.isImageSaved) {
                ctx.beginPath();
                ctx.moveTo(evt.touches[0].pageX, evt.touches[0].pageY);
                this.started = true;
              }
            },
            move(evt) {
              if (this.started && !this.isImageSaved && this.canDraw) {
                if (this.isErasing) {
                  this.updateEraserCircle(evt.touches[0].pageX, evt.touches[0].pageY);
                  ctx.clearRect(evt.touches[0].pageX - this.eraserRadius, evt.touches[0].pageY - this.eraserRadius, this.eraserRadius * 2, this.eraserRadius * 2);
                } else {
                  ctx.lineTo(evt.touches[0].pageX, evt.touches[0].pageY);
                  ctx.strokeStyle = this.color;
                  ctx.lineWidth = 5;
                  ctx.stroke();
                }
              }
            },
            end() {
              this.started = false;
            }
          };

          canvas.addEventListener('touchstart', draw.start.bind(draw), false);
          canvas.addEventListener('touchend', draw.end.bind(draw), false);
          canvas.addEventListener('touchmove', draw.move.bind(draw), false);

          // Disable page move
          document.body.addEventListener(
            'touchmove',
            (evt) => {
              evt.preventDefault();
            },
            false
          );
        },

        updateEraserCircle(x, y) {
          if (!this.eraserCircle) {
            this.eraserCircle = document.createElement('div');
            this.eraserCircle.classList.add('eraser-circle');
            document.body.appendChild(this.eraserCircle);
          }

          this.eraserCircle.style.width = `${this.eraserRadius * 2}px`;
          this.eraserCircle.style.height = `${this.eraserRadius * 2}px`;
          this.eraserCircle.style.left = `${x - this.eraserRadius}px`;
          this.eraserCircle.style.top = `${y - this.eraserRadius}px`;
        },

        resetCanvas() {
          const canvas = this.$refs.canvas;
          this.canvasContext.clearRect(0, 0, canvas.width, canvas.height);
          this.canvasContext.fillStyle = "#fff";
          this.canvasContext.fillRect(0, 0, canvas.width, canvas.height);
        },

        saveCanvas() {
          const canvas = this.$refs.canvas;
          this.savedImageDataUrl = canvas.toDataURL("image/png");
          this.isImageSaved = true;
          this.isDrawing = false;  // Disable drawing after saving
        },

        deleteImage() {
          this.savedImageDataUrl = '';
          this.isImageSaved = false;
          this.resetCanvas();  // Clear the canvas when deleting the image
          this.canDraw = false;  // Disable drawing until a color is selected
          this.showGrid = false; // Hide grid when deleting the image
        },

        startDrawing() {
          if (this.color) {
            this.canDraw = true;  // Enable drawing when color is selected and button is clicked
            this.showGrid = true;  // Show grid when drawing starts
            this.initializeCanvas();
          }
        },

        toggleEraser() {
          this.isErasing = !this.isErasing;
        },

        toggleGrid() {
          this.showGrid = !this.showGrid;
        }
      },
      mounted() {
        this.initializeCanvas();
      }
    });
  </script>
    <script src="js/app.js"></script>
</body>
</html>
