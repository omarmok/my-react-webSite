<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale:1.0">
    <title>Whiteboard Sketch</title>
    <link href="./css/bootstrap-v5.css" rel="stylesheet">
    <link href="./css/slick.css" rel="stylesheet">
    <link href="../css/slick-theme.css" rel="stylesheet">
    <link href="../css/animate.css" rel="stylesheet">
    <link href="../css/font-awesome.min.css" rel="stylesheet">
    <link href="../css/hover-min.css" rel="stylesheet">
    <link href="./css/main.css" rel="stylesheet">
    <script src="./js/jquery-3.6.0.min.js"></script>
    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="../js/slick.min.js"></script>
    <script src="./js/jquery.steps.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        #Accedentsketch {
            display: flex;
            height: 70vh;
            flex-direction: column;
        }
        .btn {
            font-family: "29LT Bukra" !important;
        }

        .mainsketch {
            display: flex;
            flex: 1;
            flex-direction: row-reverse;
        }

        #whiteboard-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 80%;
            position: relative;
            overflow: hidden;
        }

        #whiteboard {
            flex: 1;
            background-color: #ffffff;
            overflow: hidden;
            border: 2px solid #444;
            position: relative;
        }

        #itemstoslelect {
            width: 30%;
            height: 450px;
            background-color: #d9d0bc;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 1px;
            padding: 10px;
            overflow-y: scroll;
            overflow-x: hidden;
            flex-wrap: wrap;
        }

        .itemstoslelect-item {
            width: 170px;
            height: 120px;
            cursor: grab;
            background-color: transparent;
            background-repeat: no-repeat;
            background-size: inherit;
            background-position: center;
        }

        .draggable {
            position: absolute;
            cursor: grab;
            width: 100px;
            height: 220px;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }

        .action-btn {
            position: absolute;
            width: 20px;
            height: 20px;
            color: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .delete-btn {
            background-color: #dc3545;
            top: -10px;
            right: -10px;
        }

        .rotate-btn {
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #45a049;
        }

        .actionbuttons {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .previewimage {
            margin-top: 20px;
            width: 500px;
            height: 300px;
            border: 2px solid #444;
            background-color: #f4f4f9;
            position: relative;
        }

        .previewimage img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .download-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .download-btn:hover {
            background-color: #0056b3;
        }

        .delete-preview-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-preview-btn:hover {
            opacity: 0.8;
        }

        .draggable.straight-road {
            height: 500px;
        }

        .countainbg {
            width: 50px;
            height: 100px;
            background-size: contain;
        }

        .no-save {
            display: none !important;
        }
    </style>
</head>
<body>




    <!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
    Launch demo modal
  </button>
  
  <!-- Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
 
  
            <div id="Accedentsketch">
                <div class="mainsketch">
                    <div id="itemstoslelect">
                        <div v-for="(item, index) in itemstoslelectItems" :key="index" 
                             :class="['itemstoslelect-item', item.className]"
                             :style="{ backgroundImage: 'url(' + item.imageUrl + ')' }"
                             @mousedown="startDragitemstoslelectItem($event, item)">
                        </div>
                    </div>
                    <div id="whiteboard-container">
                        <div id="whiteboard" ref="whiteboard"></div>
                    </div>
                </div>
                <div id="bottom-buttons" class="mt-3 actionbuttons" v-if="draggableItems.length > 0 && !imageSaved">
                    <button class="btn btn-primary" @click="saveWhiteboard">حفظ</button>
                    <button class="btn btn-outline-info mx-3" @click="resetWhiteboard">إعادة تعيين</button>
                </div>
                <div v-if="imageSaved" class="previewimage">
                    <img :src="imageUrl" alt="Whiteboard Preview" />
                    <a :href="imageUrl" download="whiteboard.png" class="download-btn btn">تحميل</a>
                    <button class="delete-preview-btn btn" @click="deletePreview">حذف</button>
                </div>
            </div>

            


        </div>
   
      </div>
    </div>
  </div>


    <script>
        new Vue({
            el: '#Accedentsketch',
            data: {
                itemstoslelectItems: [
                    { imageUrl: './images/whiteboard/straightroad.svg', className: 'straight-road' },
                    { imageUrl: './images/whiteboard/car.svg', className: 'countainbg' },
                    { imageUrl: './images/whiteboard/man.svg', className: 'countainbg' },
                    { imageUrl: './images/whiteboard/women.svg', className: 'countainbg' },
                    { imageUrl: './images/whiteboard/girl.svg', className: 'countainbg' },
                    { imageUrl: './images/whiteboard/camel.svg', className: 'countainbg' },
                    { imageUrl: './images/whiteboard/mountain.svg', className: 'countainbg' }
                ],
                isDragging: false,
                draggedItem: null,
                offsetX: 0,
                offsetY: 0,
                draggableItems: [],
                imageSaved: false,
                imageUrl: '',
            },
            methods: {
                startDragitemstoslelectItem(event, item) {
                    // Prevent dragging if the image has been saved
                    if (this.imageSaved) {
                        return;
                    }

                    const whiteboard = this.$refs.whiteboard;
                    const newElement = document.createElement("div");
                    newElement.className = `draggable ${item.className}`;
                    newElement.style.backgroundImage = `url(${item.imageUrl})`;
                    newElement.style.left = `10px`;
                    newElement.style.top = `${event.clientY - whiteboard.offsetTop}px`;

                    const deleteBtn = document.createElement("button");
                    deleteBtn.className = "action-btn delete-btn";
                    deleteBtn.textContent = "✖";
                    deleteBtn.onclick = () => newElement.remove();
                    newElement.appendChild(deleteBtn);

                    const rotateBtn = document.createElement("button");
                    rotateBtn.className = "action-btn rotate-btn";
                    rotateBtn.textContent = "↻";
                    let rotation = 0;
                    rotateBtn.onclick = () => {
                        rotation += 15;
                        newElement.style.transform = `rotate(${rotation}deg)`;
                    };
                    newElement.appendChild(rotateBtn);

                    whiteboard.appendChild(newElement);
                    this.draggableItems.push(newElement);

                    newElement.addEventListener("mousedown", (e) => this.startDragWhiteboardItem(e, newElement));
                },

                startDragWhiteboardItem(e, element) {
                    this.isDragging = true;
                    this.draggedItem = element;
                    this.offsetX = e.clientX - element.offsetLeft;
                    this.offsetY = e.clientY - element.offsetTop;
                    document.addEventListener("mousemove", this.onDrag);
                    document.addEventListener("mouseup", this.onStopDrag);
                },

                onDrag(e) {
                    if (!this.isDragging) return;
                    this.draggedItem.style.left = `${e.clientX - this.offsetX}px`;
                    this.draggedItem.style.top = `${e.clientY - this.offsetY}px`;
                },

                onStopDrag() {
                    this.isDragging = false;
                    this.draggedItem = null;
                    document.removeEventListener("mousemove", this.onDrag);
                    document.removeEventListener("mouseup", this.onStopDrag);
                },

                saveWhiteboard() {
                    this.draggableItems.forEach(item => {
                        const buttons = item.querySelectorAll(".action-btn");
                        buttons.forEach(button => button.classList.add("no-save"));
                    });

                    html2canvas(this.$refs.whiteboard).then((canvas) => {
                        this.imageUrl = canvas.toDataURL();
                        this.imageSaved = true;

                        this.draggableItems.forEach(item => {
                            const buttons = item.querySelectorAll(".action-btn");
                            buttons.forEach(button => button.classList.remove("no-save"));
                        });
                    });
                },

                deletePreview() {
                    this.imageSaved = false;
                    this.imageUrl = '';
                },

                resetWhiteboard() {
                    this.draggableItems.forEach(item => item.remove());
                    this.draggableItems = [];
                    this.imageSaved = false;
                }
            }
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>
